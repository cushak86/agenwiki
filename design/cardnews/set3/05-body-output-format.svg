<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <!-- agenwiki card news set3 - card 5/6 : 기법 4. 출력 형식을 고정하라 -->
  <rect x="0" y="0" width="1080" height="1080" fill="#fbfbf8"/>

  <!-- top bar -->
  <text x="80" y="70" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="18" font-weight="700" fill="#5f6368">agenwiki</text>
  <text x="1000" y="70" text-anchor="end" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="18" fill="#5f6368">05 / 06</text>
  <line x1="80" y1="100" x2="1000" y2="100" stroke="#e5e7eb" stroke-width="1"/>

  <!-- heading -->
  <rect x="80" y="248" width="6" height="46" fill="#0f766e"/>
  <text x="104" y="283" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="46" font-weight="700" fill="#0f766e">기법 4. 출력 형식을 고정하라</text>

  <!-- bad/good example -->
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="30" fill="#5f6368">
    <tspan x="80" y="380">&#10060; "이름이랑 날짜 찾아줘."</tspan>
  </text>
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="30" fill="#0f766e" font-weight="700">
    <tspan x="80" y="450">&#9989; "JSON 형식으로만</tspan>
    <tspan x="110" y="504">답해줘. 다른 설명은</tspan>
    <tspan x="110" y="558">붙이지 마."</tspan>
  </text>
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="30" fill="#171717">
    <tspan x="80" y="628">&#8212; 형식을 정해주면</tspan>
    <tspan x="80" y="682">재사용이 쉬워집니다.</tspan>
  </text>

  <!-- footer -->
  <line x1="80" y1="945" x2="1000" y2="945" stroke="#e5e7eb" stroke-width="1"/>
  <text x="540" y="985" text-anchor="middle" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="22" font-weight="700" fill="#171717">agenwiki<tspan font-weight="400" font-size="20" fill="#5f6368">  ·  agenwiki.vercel.app</tspan></text>
</svg>
