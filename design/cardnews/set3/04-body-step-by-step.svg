<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <!-- agenwiki card news set3 - card 4/6 : 기법 3. 복잡한 작업은 단계로 쪼개라 -->
  <rect x="0" y="0" width="1080" height="1080" fill="#fbfbf8"/>

  <!-- top bar -->
  <text x="80" y="70" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="18" font-weight="700" fill="#5f6368">agenwiki</text>
  <text x="1000" y="70" text-anchor="end" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="18" fill="#5f6368">04 / 06</text>
  <line x1="80" y1="100" x2="1000" y2="100" stroke="#e5e7eb" stroke-width="1"/>

  <!-- heading -->
  <rect x="80" y="228" width="6" height="102" fill="#0f766e"/>
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="46" font-weight="700" fill="#0f766e">
    <tspan x="104" y="260">기법 3. 복잡한 작업은</tspan>
    <tspan x="104" y="316">단계로 쪼개라</tspan>
  </text>

  <!-- bad/good example -->
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="30" fill="#5f6368">
    <tspan x="80" y="430">&#10060; "이 데이터로 보고서 써줘."</tspan>
  </text>
  <text font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="30" fill="#0f766e" font-weight="700">
    <tspan x="80" y="510">&#9989; "1) 핵심 수치 3개를</tspan>
    <tspan x="110" y="564">뽑아줘 2) 그걸로</tspan>
    <tspan x="110" y="618">요약을 써줘 3) 다음</tspan>
    <tspan x="110" y="672">액션 2개를 제안해줘."</tspan>
  </text>

  <!-- footer -->
  <line x1="80" y1="945" x2="1000" y2="945" stroke="#e5e7eb" stroke-width="1"/>
  <text x="540" y="985" text-anchor="middle" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="22" font-weight="700" fill="#171717">agenwiki<tspan font-weight="400" font-size="20" fill="#5f6368">  ·  agenwiki.vercel.app</tspan></text>
</svg>
