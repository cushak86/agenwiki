<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <!-- agenwiki card news set1 - card 2/6 : 챗봇과 뭐가 다를까 -->
  <rect x="0" y="0" width="1080" height="1080" fill="#fbfbf8"/>

  <!-- top bar -->
  <text x="80" y="70" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="18" font-weight="700" fill="#5f6368">agenwiki</text>
  <text x="1000" y="70" text-anchor="end" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="18" fill="#5f6368">02 / 06</text>
  <line x1="80" y1="100" x2="1000" y2="100" stroke="#e5e7eb" stroke-width="1"/>

  <!-- heading -->
  <rect x="80" y="248" width="6" height="46" fill="#0f766e"/>
  <text x="104" y="283" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="46" font-weight="700" fill="#0f766e">챗봇과 뭐가 다를까</text>

  <!-- body -->
  <text x="80" y="380" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="33" fill="#171717">
    <tspan x="80" y="380">일반 챗봇은 "입력 &#8594; 답변"으로 끝나지만,</tspan>
    <tspan x="80" y="434">에이전트는 목표가 주어지면</tspan>
    <tspan x="80" y="488">계획을 세우고, 도구를 쓰고,</tspan>
    <tspan x="80" y="542">결과를 스스로 점검하는 과정을</tspan>
    <tspan x="80" y="596">반복합니다.</tspan>
  </text>

  <!-- footer -->
  <line x1="80" y1="945" x2="1000" y2="945" stroke="#e5e7eb" stroke-width="1"/>
  <text x="540" y="985" text-anchor="middle" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="22" font-weight="700" fill="#171717">agenwiki<tspan font-weight="400" font-size="20" fill="#5f6368">  ·  agenwiki.vercel.app</tspan></text>
</svg>
