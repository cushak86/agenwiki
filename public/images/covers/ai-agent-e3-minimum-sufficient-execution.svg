<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI 연구 — AI 에이전트 과잉 탐색 E3 프레임워크">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#111a2e"/>
      <stop offset="1" stop-color="#1a2440"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- subtle grid dots -->
  <g fill="#ffffff" fill-opacity="0.04">
    <circle cx="1060" cy="120" r="3"/>
    <circle cx="1110" cy="120" r="3"/>
    <circle cx="1160" cy="120" r="3"/>
    <circle cx="1060" cy="170" r="3"/>
    <circle cx="1110" cy="170" r="3"/>
    <circle cx="1160" cy="170" r="3"/>
  </g>

  <!-- accent bar -->
  <rect x="90" y="150" width="90" height="10" rx="5" fill="url(#accent)"/>

  <!-- category label -->
  <text x="90" y="128" font-family="system-ui, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif"
        font-size="30" font-weight="600" letter-spacing="2" fill="#7dd3fc">AI 연구</text>

  <!-- title (2 keyword lines) -->
  <text x="88" y="322" font-family="system-ui, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif"
        font-size="92" font-weight="800" fill="#f8fafc">AI 에이전트 과잉 탐색</text>
  <text x="88" y="432" font-family="system-ui, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif"
        font-size="92" font-weight="800" fill="#f8fafc">E3 프레임워크</text>

  <!-- footer wordmark -->
  <g>
    <circle cx="104" cy="556" r="14" fill="url(#accent)"/>
    <text x="130" y="566" font-family="system-ui, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif"
          font-size="34" font-weight="700" fill="#e2e8f0">agenwiki</text>
    <text x="1110" y="566" text-anchor="end"
          font-family="system-ui, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif"
          font-size="24" font-weight="500" fill="#64748b">AI 인사이트</text>
  </g>
</svg>
