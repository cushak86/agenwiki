<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="agenwiki — 한국어 AI 지식 허브">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf8"/>
      <stop offset="1" stop-color="#f2f1ea"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#e5e7eb" stroke-width="2"/>

  <!-- wordmark -->
  <rect x="72" y="76" width="22" height="22" rx="6" fill="#0f766e"/>
  <text x="108" y="95" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', 'Pretendard', system-ui, sans-serif"
        font-size="34" font-weight="700" fill="#171717">agenwiki</text>

  <!-- headline -->
  <text x="70" y="290" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', 'Pretendard', system-ui, sans-serif"
        font-size="76" font-weight="700" fill="#171717">한국어 AI 지식 허브</text>

  <!-- subheadline -->
  <text x="72" y="352" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', 'Pretendard', system-ui, sans-serif"
        font-size="34" font-weight="400" fill="#5f6368">AI 전반 지식백과와 에이전트 실전 가이드</text>

  <!-- footer -->
  <rect x="72" y="502" width="1056" height="2" fill="#e5e7eb"/>
  <text x="72" y="558" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', 'Pretendard', system-ui, sans-serif"
        font-size="26" font-weight="600" fill="#0f766e">에이전트 · LLM · 프롬프트</text>
  <text x="1128" y="558" text-anchor="end"
        font-family="'Malgun Gothic', 'Apple SD Gothic Neo', 'Pretendard', system-ui, sans-serif"
        font-size="26" font-weight="400" fill="#5f6368">agenwiki.vercel.app</text>
</svg>
